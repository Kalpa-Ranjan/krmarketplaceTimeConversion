<!-- ============================================================
  EST/EDT ↔ IST Time Converter Widget
  Drop this entire block into a WordPress "Custom HTML" block.
  Fully self-contained: no external libraries, fonts, or requests.
============================================================= -->
<div id="tzc-widget">
<style>
  #tzc-widget {
    --tzc-bg: #f1f5f9;
    --tzc-surface: #ffffff;
    --tzc-surface-2: #f8fafc;
    --tzc-border: #e2e8f0;
    --tzc-text: #0f172a;
    --tzc-text-muted: #64748b;
    --tzc-text-faint: #94a3b8;
    --tzc-accent: #334155;
    --tzc-accent-2: #475569;
    --tzc-radius: 16px;
    --tzc-radius-sm: 10px;
    --tzc-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 8px 24px rgba(15, 23, 42, 0.06);
    all: initial;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--tzc-text);
    width: 100%;
    padding: 24px 16px;
  }

  @media (prefers-color-scheme: dark) {
    #tzc-widget {
      --tzc-bg: #0f172a;
      --tzc-surface: #1e293b;
      --tzc-surface-2: #263449;
      --tzc-border: #334155;
      --tzc-text: #f1f5f9;
      --tzc-text-muted: #94a3b8;
      --tzc-text-faint: #64748b;
      --tzc-accent: #cbd5e1;
      --tzc-accent-2: #e2e8f0;
      --tzc-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 8px 24px rgba(0, 0, 0, 0.4);
    }
  }

  #tzc-widget *,
  #tzc-widget *::before,
  #tzc-widget *::after {
    box-sizing: border-box;
  }

  #tzc-widget #tzc-app {
    width: 100%;
    max-width: 480px;
    transform: translateY(-8vh);
  }

  #tzc-widget .tzc-card {
    background: var(--tzc-surface);
    border: 1px solid var(--tzc-border);
    border-radius: var(--tzc-radius);
    box-shadow: var(--tzc-shadow);
    padding: 28px 24px;
  }

  /* ---------- Selection screen ---------- */
  #tzc-widget .tzc-select-title {
    font-size: 17px;
    font-weight: 600;
    text-align: center;
    margin: 0 0 6px;
    color: var(--tzc-text);
  }

  #tzc-widget .tzc-select-sub {
    font-size: 13px;
    text-align: center;
    color: var(--tzc-text-muted);
    margin: 0 0 22px;
  }

  #tzc-widget .tzc-option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  #tzc-widget .tzc-option-btn {
    all: unset;
    box-sizing: border-box;
    cursor: pointer;
    text-align: center;
    padding: 28px 12px;
    border-radius: var(--tzc-radius-sm);
    border: 1.5px solid var(--tzc-border);
    background: var(--tzc-surface-2);
    transition: transform 0.12s ease, border-color 0.12s ease, background 0.12s ease;
  }

  #tzc-widget .tzc-option-btn:hover {
    border-color: var(--tzc-accent-2);
    transform: translateY(-2px);
  }

  #tzc-widget .tzc-option-btn:active {
    transform: translateY(0);
  }

  #tzc-widget .tzc-option-btn:focus-visible {
    outline: 2px solid var(--tzc-accent-2);
    outline-offset: 2px;
  }

  #tzc-widget .tzc-option-code {
    display: block;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--tzc-text);
  }

  #tzc-widget .tzc-option-desc {
    display: block;
    margin-top: 4px;
    font-size: 12px;
    color: var(--tzc-text-muted);
  }

  /* ---------- Converter screen ---------- */
  #tzc-widget .tzc-clock-wrap {
    text-align: center;
    padding-bottom: 20px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--tzc-border);
  }

  #tzc-widget .tzc-clock {
    display: block;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 34px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    line-height: 1.2;
    transition: color 0.12s ease;
  }

  #tzc-widget .tzc-clock-date {
    margin-top: 4px;
    font-size: 13px;
    color: var(--tzc-text-muted);
  }

  #tzc-widget .tzc-clock-btn {
    all: unset;
    box-sizing: border-box;
    display: inline-block;
    cursor: pointer;
    padding: 2px 10px;
    border-radius: var(--tzc-radius-sm);
    transition: background 0.12s ease;
  }

  #tzc-widget .tzc-clock-btn:hover {
    background: var(--tzc-surface-2);
  }

  #tzc-widget .tzc-clock-btn:hover .tzc-clock {
    color: var(--tzc-accent-2);
  }

  #tzc-widget .tzc-clock-btn:focus-visible {
    outline: 2px solid var(--tzc-accent-2);
    outline-offset: 2px;
  }

  #tzc-widget .tzc-field-label {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  #tzc-widget .tzc-input {
    all: unset;
    box-sizing: border-box;
    display: block;
    width: 100%;
    padding: 13px 14px;
    font-size: 30px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    text-align: center;
    color: var(--tzc-text);
    background: var(--tzc-surface-2);
    border: 1.5px solid var(--tzc-border);
    border-radius: var(--tzc-radius-sm);
    transition: border-color 0.12s ease;
  }

  #tzc-widget .tzc-input::placeholder {
    color: var(--tzc-text-faint);
  }

  #tzc-widget .tzc-input:focus {
    border-color: var(--tzc-accent-2);
  }

  #tzc-widget .tzc-output {
    display: block;
    margin-top: 18px;
    background: transparent;
    border: none;
    padding: 0;
    text-align: center;
  }

  #tzc-widget .tzc-output-value {
    font-size: 30px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
    color: var(--tzc-text);
    word-break: break-word;
  }

  #tzc-widget .tzc-output-value.tzc-dim {
    color: var(--tzc-text-faint);
  }

  #tzc-widget .tzc-zone-toggle {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    background: var(--tzc-surface-2);
    border: 1px solid var(--tzc-border);
    border-radius: 999px;
    padding: 4px;
    margin: 0 auto 22px;
    max-width: 240px;
  }

  #tzc-widget .tzc-zone-tab {
    all: unset;
    box-sizing: border-box;
    position: relative;
    z-index: 1;
    text-align: center;
    cursor: pointer;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--tzc-text-muted);
    padding: 9px 14px;
    border-radius: 999px;
    transition: color 0.2s ease;
  }

  #tzc-widget .tzc-zone-tab:hover {
    color: var(--tzc-text);
  }

  #tzc-widget .tzc-zone-tab:focus-visible {
    outline: 2px solid var(--tzc-accent-2);
    outline-offset: 2px;
  }

  #tzc-widget .tzc-zone-tab.tzc-zone-tab-active {
    color: var(--tzc-surface);
    cursor: default;
  }

  #tzc-widget .tzc-zone-toggle-thumb {
    position: absolute;
    top: 4px;
    left: 4px;
    width: calc(50% - 4px);
    height: calc(100% - 8px);
    background: var(--tzc-accent);
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(15, 23, 42, 0.25);
    transition: transform 0.24s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #tzc-widget .tzc-zone-toggle-thumb.tzc-thumb-ist {
    transform: translateX(100%);
  }

  @media (max-width: 380px) {
    #tzc-widget .tzc-clock { font-size: 26px; letter-spacing: 1px; }
    #tzc-widget .tzc-input,
    #tzc-widget .tzc-output-value { font-size: 24px; }
    #tzc-widget .tzc-card { padding: 22px 16px; }
  }
</style>

<main id="tzc-app" aria-label="EST to IST time converter">

  <!-- Screen 1: base zone selection -->
  <section id="tzc-select-screen" class="tzc-card">
    <div class="tzc-option-grid">
      <button type="button" class="tzc-option-btn" data-zone="EST">
        <span class="tzc-option-code" id="tzc-select-est-label">EST</span>
        <span class="tzc-option-desc">Eastern Time (US)</span>
      </button>
      <button type="button" class="tzc-option-btn" data-zone="IST">
        <span class="tzc-option-code">IST</span>
        <span class="tzc-option-desc">Indian Standard Time</span>
      </button>
    </div>
  </section>

  <!-- Screen 2: converter -->
  <section id="tzc-converter-screen" class="tzc-card" hidden>
    <div class="tzc-zone-toggle" role="tablist" aria-label="Base time zone">
      <div class="tzc-zone-toggle-thumb" id="tzc-zone-thumb" aria-hidden="true"></div>
      <button type="button" class="tzc-zone-tab" data-zone="EST" id="tzc-tab-est" role="tab">EST</button>
      <button type="button" class="tzc-zone-tab" data-zone="IST" id="tzc-tab-ist" role="tab">IST</button>
    </div>

    <div class="tzc-clock-wrap">
      <button type="button" class="tzc-clock-btn" id="tzc-clock-btn" aria-label="Use current time">
        <time class="tzc-clock" id="tzc-clock">--:--:-- --</time>
      </button>
      <div class="tzc-clock-date" id="tzc-clock-date"></div>
    </div>

    <label class="tzc-field-label" for="tzc-input" id="tzc-input-label">Enter a time in Eastern Time</label>
    <input
      id="tzc-input"
      class="tzc-input"
      type="text"
      inputmode="text"
      autocomplete="off"
      spellcheck="false"
    />

    <output class="tzc-output" id="tzc-output" for="tzc-input">
      <div class="tzc-output-value tzc-dim" id="tzc-output-value">-</div>
    </output>
  </section>

</main>
</div>

<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'tzcBaseZone';

  var ZONES = {
    EST: { tz: 'America/New_York', staticLabel: null, name: 'Eastern Time' },
    IST: { tz: 'Asia/Kolkata', staticLabel: 'IST', name: 'Indian Standard Time' }
  };

  var root = document.getElementById('tzc-widget');
  var selectScreen = root.querySelector('#tzc-select-screen');
  var converterScreen = root.querySelector('#tzc-converter-screen');
  var clockEl = root.querySelector('#tzc-clock');
  var clockDateEl = root.querySelector('#tzc-clock-date');
  var clockBtn = root.querySelector('#tzc-clock-btn');
  var inputLabel = root.querySelector('#tzc-input-label');
  var inputEl = root.querySelector('#tzc-input');
  var outputValueEl = root.querySelector('#tzc-output-value');
  var selectEstLabel = root.querySelector('#tzc-select-est-label');
  var tabEst = root.querySelector('#tzc-tab-est');
  var tabIst = root.querySelector('#tzc-tab-ist');
  var zoneThumb = root.querySelector('#tzc-zone-thumb');

  var baseKey = null;
  var targetKey = null;
  var tickHandle = null;
  var pendingManualTime = null; // {hour, minute}

  function pad(num, len) {
    len = len || 2;
    var s = String(Math.trunc(Math.abs(num)));
    while (s.length < len) s = '0' + s;
    return s;
  }

  // Reads the UTC offset (in minutes) of a IANA time zone at a given instant,
  // via Intl's own DST tables rather than a hand-rolled DST calendar.
  function getOffsetMinutes(timeZone, date) {
    var dtf = new Intl.DateTimeFormat('en-US', {
      timeZone: timeZone,
      timeZoneName: 'shortOffset',
      hour: 'numeric'
    });
    var parts = dtf.formatToParts(date);
    var tzPart = parts.filter(function (p) { return p.type === 'timeZoneName'; })[0];
    var raw = tzPart ? tzPart.value : 'GMT+0';
    var m = raw.match(/GMT([+-])(\d{1,2})(?::?(\d{2}))?/);
    if (!m) return 0;
    var sign = m[1] === '-' ? -1 : 1;
    var hours = parseInt(m[2], 10);
    var minutes = m[3] ? parseInt(m[3], 10) : 0;
    return sign * (hours * 60 + minutes);
  }

  function getZoneDateParts(timeZone, date) {
    var dtf = new Intl.DateTimeFormat('en-US', {
      timeZone: timeZone,
      hour12: false,
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
    var parts = dtf.formatToParts(date);
    var obj = {};
    parts.forEach(function (p) {
      if (p.type !== 'literal') obj[p.type] = p.value;
    });
    var hour = parseInt(obj.hour, 10);
    if (hour === 24) hour = 0;
    return {
      year: parseInt(obj.year, 10),
      month: parseInt(obj.month, 10),
      day: parseInt(obj.day, 10),
      hour: hour,
      minute: parseInt(obj.minute, 10),
      second: parseInt(obj.second, 10)
    };
  }

  function getZoneLabel(zoneKey, date) {
    var zone = ZONES[zoneKey];
    if (zone.staticLabel) return zone.staticLabel;
    var offset = getOffsetMinutes(zone.tz, date);
    return offset === -300 ? 'EST' : 'EDT';
  }

  function formatClockDisplay(zoneKey, date) {
    var zone = ZONES[zoneKey];
    var dtf = new Intl.DateTimeFormat('en-US', {
      timeZone: zone.tz,
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
    var timeStr = dtf.format(date);
    var dateDtf = new Intl.DateTimeFormat('en-US', {
      timeZone: zone.tz,
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    return {
      time: timeStr + ' ' + getZoneLabel(zoneKey, date),
      date: dateDtf.format(date)
    };
  }

  function formatOutputString(zoneKey, date) {
    var zone = ZONES[zoneKey];
    var p = getZoneDateParts(zone.tz, date);
    var meridiem = p.hour < 12 ? 'AM' : 'PM';
    var hour12 = p.hour % 12;
    if (hour12 === 0) hour12 = 12;
    return (
      hour12 + ':' + pad(p.minute) + ':' + pad(p.second) + ' ' + meridiem +
      ' ' + getZoneLabel(zoneKey, date)
    );
  }

  // Converts a wall-clock HH:MM (today, in the base zone) into the
  // equivalent instant, expressed as an epoch-ms Date.
  function resolveManualInstant(hour, minute) {
    var now = new Date();
    var baseTz = ZONES[baseKey].tz;
    var baseToday = getZoneDateParts(baseTz, now);
    var naiveUTC = Date.UTC(baseToday.year, baseToday.month - 1, baseToday.day, hour, minute, 0, 0);
    var offset = getOffsetMinutes(baseTz, new Date(naiveUTC));
    var actualUTC = naiveUTC - offset * 60000;
    return new Date(actualUTC);
  }

  // A single typed digit is the tens place of a two-digit minute field
  // (e.g. "1:1" reads as "1:10", matching how a partially-typed minute looks).
  function parseMinutePart(str) {
    if (!str) return 0;
    var n = parseInt(str, 10);
    return str.length === 1 ? n * 10 : n;
  }

  function parseTimeInput(raw) {
    var value = raw.trim();
    if (!value) return { kind: 'empty' };

    var twelveHour = value.match(/^(1[0-2]|0?[1-9]):([0-5]?[0-9])?\s*([AaPp])[Mm]?$/);
    if (twelveHour) {
      var h12 = parseInt(twelveHour[1], 10);
      var min12 = parseMinutePart(twelveHour[2]);
      if (min12 > 59) return { kind: 'invalid' };
      var meridiem = twelveHour[3].toUpperCase();
      if (meridiem === 'A') h12 = h12 === 12 ? 0 : h12;
      else h12 = h12 === 12 ? 12 : h12 + 12;
      return { kind: 'manual', hour: h12, minute: min12 };
    }

    var twentyFourHour = value.match(/^([01]?[0-9]|2[0-3]):([0-5]?[0-9])?$/);
    if (twentyFourHour) {
      var min24 = parseMinutePart(twentyFourHour[2]);
      if (min24 > 59) return { kind: 'invalid' };
      return {
        kind: 'manual',
        hour: parseInt(twentyFourHour[1], 10),
        minute: min24
      };
    }

    var bareTwelveHour = value.match(/^(1[0-2]|0?[1-9])\s*([AaPp])[Mm]?$/);
    if (bareTwelveHour) {
      var hBare = parseInt(bareTwelveHour[1], 10);
      var meridiemBare = bareTwelveHour[2].toUpperCase();
      if (meridiemBare === 'A') hBare = hBare === 12 ? 0 : hBare;
      else hBare = hBare === 12 ? 12 : hBare + 12;
      return { kind: 'manual', hour: hBare, minute: 0 };
    }

    var bareTwentyFourHour = value.match(/^([01]?[0-9]|2[0-3])$/);
    if (bareTwentyFourHour) {
      return { kind: 'manual', hour: parseInt(bareTwentyFourHour[1], 10), minute: 0 };
    }

    return { kind: 'invalid' };
  }

  function stopTicking() {
    if (tickHandle) {
      clearInterval(tickHandle);
      tickHandle = null;
    }
  }

  function setOutputVisible(visible) {
    outputValueEl.classList.toggle('tzc-dim', !visible);
  }

  function renderStaticOutput() {
    if (!pendingManualTime) return;
    var instant = resolveManualInstant(pendingManualTime.hour, pendingManualTime.minute);
    setOutputVisible(true);
    outputValueEl.textContent = formatOutputString(targetKey, instant);
  }

  function tick() {
    var now = new Date();
    var clockDisplay = formatClockDisplay(baseKey, now);
    clockEl.textContent = clockDisplay.time;
    clockDateEl.textContent = clockDisplay.date;
  }

  function handleInput() {
    var parsed = parseTimeInput(inputEl.value);

    if (parsed.kind === 'empty' || parsed.kind === 'invalid') {
      pendingManualTime = null;
      setOutputVisible(false);
      outputValueEl.textContent = '-';
      return;
    }

    pendingManualTime = { hour: parsed.hour, minute: parsed.minute };
    renderStaticOutput();
  }

  function useCurrentTime() {
    var now = new Date();
    var baseToday = getZoneDateParts(ZONES[baseKey].tz, now);
    var hour = baseToday.hour;
    var meridiem = hour < 12 ? 'AM' : 'PM';
    var hour12 = hour % 12;
    if (hour12 === 0) hour12 = 12;

    inputEl.value = hour12 + ':' + pad(baseToday.minute) + ' ' + meridiem;
    handleInput();
    inputEl.focus();
  }

  function applyZoneLabels() {
    var baseZone = ZONES[baseKey];
    var now = new Date();
    var baseLabel = getZoneLabel(baseKey, now);

    inputLabel.textContent = 'Enter a time in ' + baseZone.name + ' (' + baseLabel + ')';

    tabEst.textContent = getZoneLabel('EST', now);
    tabEst.classList.toggle('tzc-zone-tab-active', baseKey === 'EST');
    tabEst.setAttribute('aria-selected', baseKey === 'EST' ? 'true' : 'false');
    tabIst.classList.toggle('tzc-zone-tab-active', baseKey === 'IST');
    tabIst.setAttribute('aria-selected', baseKey === 'IST' ? 'true' : 'false');
    zoneThumb.classList.toggle('tzc-thumb-ist', baseKey === 'IST');
  }

  function switchZone(zoneKey) {
    if (zoneKey === baseKey) return;
    try {
      localStorage.setItem(STORAGE_KEY, zoneKey);
    } catch (e) { /* localStorage unavailable - proceed without persistence */ }
    showConverter(zoneKey);
  }

  function showConverter(zoneKey) {
    baseKey = zoneKey;
    targetKey = zoneKey === 'EST' ? 'IST' : 'EST';

    selectScreen.hidden = true;
    converterScreen.hidden = false;

    inputEl.value = '';
    pendingManualTime = null;
    setOutputVisible(false);
    outputValueEl.textContent = '-';

    applyZoneLabels();
    stopTicking();
    tick();
    tickHandle = setInterval(function () {
      applyZoneLabels();
      tick();
    }, 1000);
  }

  function showSelection() {
    stopTicking();
    baseKey = null;
    targetKey = null;
    converterScreen.hidden = true;
    selectScreen.hidden = false;
    selectEstLabel.textContent = getZoneLabel('EST', new Date());
  }

  function init() {
    var saved = null;
    try {
      saved = localStorage.getItem(STORAGE_KEY);
    } catch (e) {
      saved = null;
    }

    if (saved === 'EST' || saved === 'IST') {
      showConverter(saved);
    } else {
      showSelection();
    }

    var optionButtons = selectScreen.querySelectorAll('.tzc-option-btn');
    optionButtons.forEach(function (btn) {
      btn.addEventListener('click', function () {
        var zone = btn.getAttribute('data-zone');
        try {
          localStorage.setItem(STORAGE_KEY, zone);
        } catch (e) { /* localStorage unavailable - proceed without persistence */ }
        showConverter(zone);
      });
    });

    inputEl.addEventListener('input', handleInput);
    clockBtn.addEventListener('click', useCurrentTime);

    tabEst.addEventListener('click', function () { switchZone('EST'); });
    tabIst.addEventListener('click', function () { switchZone('IST'); });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
