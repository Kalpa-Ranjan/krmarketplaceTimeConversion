name: Deploy EST/IST widget via FTP

on:
  push:
    branches: [main]
    paths:
      - "est-ist-time-converter.html"
      - ".github/workflows/deploy-ftp.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage only the widget file, renamed to index.html
        run: |
          mkdir -p dist
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta name="description" content="Convert time between US Eastern Time and Indian Standard Time.">
              <title>EST to IST Time Converter</title>
            </head>
            <body>
          EOF
          cat est-ist-time-converter.html >> dist/index.html
          cat >> dist/index.html <<'EOF'
            </body>
          </html>
          EOF

      # dangerous-clean-slate stays false, and server-dir is scoped to /estist/ only
      # so this action can never touch anything outside that one subfolder.
      - name: FTP upload to public_html/estist
        if: secrets.FTP_HOST != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != ''
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /estist/
          dangerous-clean-slate: false
