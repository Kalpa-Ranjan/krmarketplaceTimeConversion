name: Deploy EST/IST widget via FTP

on:
  push:
    branches: [main]
    paths:
      - "est-ist-time-converter.html"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage the widget wrapped in a standalone HTML page
        run: |
          mkdir -p dist
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '<meta charset="UTF-8">'
            echo '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '<title>EST/EDT &harr; IST Time Converter</title>'
            echo '</head>'
            echo '<body>'
            cat est-ist-time-converter.html
            echo '</body>'
            echo '</html>'
          } > dist/index.html

      - name: Debug secret shape (no raw values printed)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        run: |
          printf '%s' "$FTP_HOST" | wc -c
          printf '%s' "$FTP_HOST" | od -c | head -5
          printf '%s' "$FTP_USERNAME" | wc -c

      # dangerous-clean-slate stays false, and server-dir is scoped to /estist/ only
      # so this action can never touch anything outside that one subfolder.
      - name: FTP upload to public_html/estist
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /estist/
          dangerous-clean-slate: false
